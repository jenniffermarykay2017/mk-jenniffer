<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR — Tu piel, tu historia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5e8ef;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .card{background:white;border-radius:28px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 20px 60px rgba(140,46,80,0.22);}
  .card-top{background:linear-gradient(160deg,#6b1a35 0%,#c8507a 60%,#e8a0be 100%);padding:32px 24px 28px;text-align:center;position:relative;overflow:hidden;}
  .card-top::before{content:'✿';position:absolute;right:-15px;top:-15px;font-size:120px;opacity:0.07;color:white;}
  .card-top::after{content:'✿';position:absolute;left:-15px;bottom:-20px;font-size:80px;opacity:0.07;color:white;}
  .mk-label{font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
  .main-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:white;font-weight:300;line-height:1.2;margin-bottom:4px;}
  .main-title em{font-style:italic;font-weight:600;}
  .divider{width:40px;height:2px;background:rgba(255,255,255,0.4);border-radius:2px;margin:14px auto;}
  .name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:rgba(255,255,255,0.9);font-weight:400;letter-spacing:0.5px;}
  .subtitle{font-size:0.72rem;color:rgba(255,255,255,0.65);margin-top:3px;letter-spacing:0.5px;}
  .card-bottom{padding:26px 24px 28px;text-align:center;background:white;}
  .qr-container{position:relative;display:inline-block;margin-bottom:16px;}
  #qr-canvas{border-radius:12px;border:2px solid #f5d0df;box-shadow:0 4px 20px rgba(200,80,122,0.12);display:block;}
  .scan-text{font-size:0.78rem;color:#9a7080;font-weight:600;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .scan-text::before,.scan-text::after{content:'';flex:1;height:1px;background:#f0dde6;}
  .url{font-size:0.75rem;color:#c8507a;font-weight:700;margin-bottom:16px;}
  .footer-rose{display:flex;justify-content:center;gap:6px;font-size:0.85rem;opacity:0.4;}
  .print-btn{margin-top:20px;background:linear-gradient(135deg,#c8507a,#8c2e50);color:white;border:none;border-radius:30px;padding:12px 30px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;box-shadow:0 4px 16px rgba(200,80,122,0.3);}
  .share-btn{margin-top:10px;background:white;color:#c8507a;border:2px solid #f5d0df;border-radius:30px;padding:11px 30px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;display:block;}
  @media print{body{background:white;padding:0;}.print-btn,.share-btn{display:none;}.card{box-shadow:none;}}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="mk-label">✨ Consulta Personalizada Gratuita</div>
    <div class="main-title">Tu piel,<br><em>tu historia</em></div>
    <div class="divider"></div>
    <div class="name">Jenniffer Ivelisse</div>
    <div class="subtitle">Tu Consultora de Belleza Independiente · Mary Kay</div>
  </div>
  <div class="card-bottom">
    <div class="qr-container">
      <canvas id="qr-canvas" width="240" height="240"></canvas>
    </div>
    <div class="scan-text">Escanea y descubre</div>
    <div class="url">tupieltuhistoria.netlify.app</div>
    <div class="footer-rose">🌸 🌸 🌸</div>
  </div>
</div>
<button class="print-btn" onclick="window.print()">🖨️ Imprimir tarjeta</button>
<button class="share-btn" onclick="shareCard()">📤 Compartir por WhatsApp</button>

const URL = 'https://tupieltuhistoria.netlify.app';

const tempDiv = document.createElement('div');
new QRCode(tempDiv, {
  text: URL,
  width: 240,
  height: 240,
  colorDark: '#8c2e50',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});

setTimeout(() => {
  const qrImg = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');

  const drawQR = new Image();
  drawQR.onload = function() {
    ctx.drawImage(drawQR, 0, 0, 240, 240);
    const logoImg = new Image();
    logoImg.onload = function() {
      const size = 110;
      const cx = 120, cy = 120;
      ctx.drawImage(logoImg, cx - size/2, cy - size/2, size, size);
    };
    logoImg.src = LOGO_B64;
  };
  if (qrImg.tagName === 'CANVAS') {
    drawQR.src = qrImg.toDataURL();
  } else {
    drawQR.src = qrImg.src;
  }
}, 300);

async function shareCard() {
  if (navigator.share) {
    await navigator.share({ title: 'Tu piel, tu historia', text: '✨ Consulta personalizada gratuita de Mary Kay', url: URL });
  } else {
    navigator.clipboard.writeText(URL);
    alert('¡Link copiado! 🌸');
  }
}
